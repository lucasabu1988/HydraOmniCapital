services:
  - type: web
    name: compass-dashboard
    runtime: python
    buildCommand: pip install -r requirements-cloud.txt
    startCommand: gunicorn compass_dashboard_cloud:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --preload
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: HYDRA_MODE
        value: "live"
      - key: GIT_TOKEN
        sync: false  # set manually in Render dashboard — GitHub PAT with repo write access
