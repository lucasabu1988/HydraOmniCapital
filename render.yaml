services:
  - type: web
    name: omnicapital
    runtime: python
    repo: https://github.com/lucasabu1988/NuevoProyecto
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements-cloud.txt
    startCommand: gunicorn compass_dashboard_cloud:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --preload
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: HYDRA_MODE
        sync: false
      - key: COMPASS_MODE
        sync: false
      - key: GIT_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
