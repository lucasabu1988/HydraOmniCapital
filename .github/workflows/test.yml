name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: >
          pytest tests/ -v --tb=short
          --cov-config=.coveragerc
          --cov=compass_api_models
          --cov=compass_dashboard
          --cov=compass_dashboard_cloud
          --cov=compass_ml_learning
          --cov=omnicapital_broker
          --cov=omnicapital_live
          --cov-report=term-missing
          --cov-fail-under=50

      - name: Coverage report
        if: always()
        run: |
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          coverage report --format=markdown >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Coverage report unavailable" >> $GITHUB_STEP_SUMMARY
